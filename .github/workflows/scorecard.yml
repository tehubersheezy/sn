name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: "0 0 * * 1" # weekly, Monday 00:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload SARIF results to GitHub code scanning.
      security-events: write
      # Needed to publish results and get a badge (cf. publish_results below).
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to https://scorecard.dev so the project gets
          # a public scorecard page and a badge URL.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SARIF results
          path: results.sarif
          retention-days: 5

      - name: Upload to GitHub code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
